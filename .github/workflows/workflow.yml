name: Deploy EC2 with CloudFormation
on:
  push:
    branches: ["main"]
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: AWS_CREDENTIAL
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file ec2-template.yml \
            --stack-name my-ec2-stack \
            --parameter-overrides \
              KeyName=${{ secrets.AWS_KEY_NAME }} \
              AmiId=${{ secrets.AWS_AMI_ID }} \
              SubnetId=${{ secrets.AWS_SUBNET_ID }} \
              SecurityGroupId=${{ secrets.AWS_SG_ID }} \
            --capabilities CAPABILITY_IAM
